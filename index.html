<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>כלים למורה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#05080f; --bg2:#0a1020;
  --ink:#f7f4ec; --ink-dim:#aab4cf;
  --gold:#ffd166; --teal:#2ec4b6; --violet:#8d8df2;
  --card:#22325c; --card-hi:#2c3f72;
}
*{box-sizing:border-box;}
html,body{margin:0; padding:0; min-height:100%;}
body{font-family:'Heebo',sans-serif; background:radial-gradient(1200px 700px at 75% -10%, #16223f 0%, var(--bg2) 45%, var(--bg1) 100%); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
.wrap{width:100%; max-width:620px; text-align:center;}
h1{font-family:'Secular One'; font-size:clamp(34px,5.5vw,58px); margin:0 0 8px; color:var(--gold);}
.sub{font-size:18px; color:var(--ink-dim); max-width:440px; margin:0 auto 36px; line-height:1.5;}
.cards{display:flex; gap:20px; flex-wrap:wrap; justify-content:center;}
.card{flex:1 1 240px; max-width:280px; background:var(--card); border-radius:22px; padding:32px 24px; cursor:pointer; text-decoration:none; color:var(--ink); transition:transform .15s ease, background .15s ease; border:2px solid transparent;}
.card:hover{transform:translateY(-4px); background:var(--card-hi); border-color:var(--gold);}
.card .emoji{font-size:56px; margin-bottom:14px;}
.card h2{font-family:'Secular One'; font-size:26px; margin:0 0 8px;}
.card p{font-size:15px; color:var(--ink-dim); margin:0; line-height:1.5;}
.foot{margin-top:38px; font-size:13px; color:var(--ink-dim);}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎓 כלים למורה</h1>
  <p class="sub">בחרו מה לבנות — חידון טריוויה כיתתי, או מצגת תמונות עם מוזיקה.</p>
  <div class="cards">
    <a class="card" href="teacherquiz.html">
      <div class="emoji">🧠</div>
      <h2>חידון</h2>
      <p>בנו חידון טריוויה, והתלמידים משחקים מהטלפון.</p>
    </a>
    <a class="card" href="teachermontage.html">
      <div class="emoji">🎬</div>
      <h2>מצגת תמונות</h2>
      <p>בחרו תמונות ומוזיקה, והציגו על המסך.</p>
    </a>
  </div>
  <p class="foot">אפשר לחזור לכאן בכל רגע כדי לעבור בין הכלים.</p>
</div>
</body>
</html>
