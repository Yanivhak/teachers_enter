<!DOCTYPE html>
<!--
  ניהול חידונים (admin, yopoy) — changelog
  v2 - לוח-מודרציה + מייל-אדמין כפול: (א) מייל-האדמין הורחב לשני חשבונות (ADMIN_EMAILS: yanivhpro@gmail.com + yaniv.hakim@mail.huji.ac.il) — שניהם בעלי הרשאות-אדמין זהות, מבטל את סכנת הנעילה-העצמית בהחלפת מייל. (ב) נוסף מקטע מודרציה (loadModeration) הקורא library/lib_reports/blocked/appeals/teachers ומציג: פריטים מדווחים (כל מדווח עם מייל+סיבה+הערה+זמן, מצב מוסתר/דווח, וכפתורי השב-לספרייה/הסתר-ידנית/חסום-בעלים); בעלים שתוכנם דווח 3+; מדווחים-חריגים 5+ (התרעה בלבד, חסימה ידנית); ערעורים (טקסט המשתמש + ביטול-חסימה/דחייה); ומשתמשים חסומים. חסימה כותבת blocked/{uid} (נאכף ע"י הכללים על פרסום/דיווח/הצבעה, לא על תוכן פרטי). אומת: node --check + איזון-תגיות.
  v1 - גרסה ראשונה במעקב. החלפת 2 הדיאלוגים הנייטיב (confirm למחיקת כל חידוני מורה, ו-alert שגיאה) במודאל אישור פנימי + toast, זהים לאלה שב-QuizPlay/הספרייה. מונע את חלון "Suppress dialogs" של הדפדפן (שמופיע אחרי כמה דיאלוגים נייטיב ברצף — רלוונטי כאן כי מוחקים כמה מורים ברצף). נוסף showConfirm + toast + .confirm-ov + חותמת-גרסה גלויה.
-->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>ניהול — חידונים</title>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{ --bg1:#05080f; --bg2:#0a1020; --ink:#f7f4ec; --ink-dim:#aab4cf; --gold:#ffd166; --teal:#2ec4b6; --card:#22325c; }
*{box-sizing:border-box;}
body{font-family:'Heebo',sans-serif; background:radial-gradient(1200px 700px at 75% -10%, #16223f 0%, var(--bg2) 45%, var(--bg1) 100%); color:var(--ink); min-height:100vh; padding:30px 18px; line-height:1.6;}
.wrap{max-width:720px; margin:0 auto;}
h1{font-family:'Secular One'; font-size:34px; color:var(--gold); text-align:center; margin:0 0 4px;}
.sub{text-align:center; color:var(--ink-dim); margin:0 0 24px;}
.stat{display:flex; gap:14px; justify-content:center; margin-bottom:24px; flex-wrap:wrap;}
.stat .box{background:var(--card); border-radius:14px; padding:16px 26px; text-align:center;}
.stat .num{font-family:'Secular One'; font-size:34px; color:var(--teal);}
.stat .lbl{font-size:13px; color:var(--ink-dim);}
.row{background:var(--card); border-radius:12px; padding:12px 18px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:10px;}
.row .email{font-weight:700; word-break:break-all;}
.row .count{color:var(--gold); font-weight:800; white-space:nowrap;}
#msg{text-align:center; color:var(--ink-dim); margin:20px 0;}
/* v1: toast + מודאל אישור פנימי — מחליפים alert/confirm נייטיב */
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#0d1426; border:1px solid rgba(255,255,255,.2); border-radius:12px; padding:12px 20px; font-size:15px; box-shadow:0 10px 30px rgba(0,0,0,.5); z-index:100; opacity:0; transition:opacity .3s; pointer-events:none; max-width:90vw; text-align:center;}
.toast.show{opacity:1;}
.confirm-ov{display:none; position:fixed; inset:0; z-index:320; background:rgba(5,8,20,.74); align-items:center; justify-content:center; padding:24px;}
.confirm-ov.on{display:flex;}
.confirm-box{background:#1a2440; border:1px solid rgba(255,255,255,.14); border-radius:18px; padding:24px 22px; max-width:430px; width:100%; box-shadow:0 14px 44px rgba(0,0,0,.55);}
.confirm-msg{font-family:'Heebo'; font-size:16px; line-height:1.6; color:var(--ink); white-space:pre-line; text-align:center; margin-bottom:20px;}
.confirm-btns{display:flex; gap:12px; justify-content:center;}
.cbtn{flex:1; font-family:'Heebo'; font-weight:700; font-size:15px; padding:11px 16px; border-radius:12px; border:none; cursor:pointer;}
.cbtn.yes{background:var(--teal); color:#06231f;}
.cbtn.no{background:transparent; color:var(--ink); box-shadow:inset 0 0 0 2px rgba(255,255,255,.2);}
/* v2: מודרציה */
.mod-h{font-family:'Secular One'; font-size:20px; color:var(--gold); margin:26px 0 10px; border-bottom:1px solid rgba(255,255,255,.12); padding-bottom:6px;}
.mod-empty{color:var(--ink-dim); font-size:14px; margin:4px 0 12px;}
.mod-card{background:var(--card); border-radius:12px; padding:14px 16px; margin-bottom:10px;}
.mod-card .ttl{font-weight:700; font-size:15px;}
.mod-card .st{font-size:13px; color:var(--ink-dim); margin:4px 0 8px;}
.mod-rep{font-size:13px; color:var(--ink-dim); padding:4px 0; border-top:1px dashed rgba(255,255,255,.08);}
.mod-rep b{color:var(--ink);}
.mod-actions{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center;}
.mod-actions button{border:none; border-radius:8px; padding:6px 12px; cursor:pointer; font-family:Heebo; font-size:13px;}
.b-restore{background:var(--teal); color:#06231f;}
.b-hide{background:#7a5b18; color:#fff;}
.b-block{background:#c0392b; color:#fff;}
.b-unblock{background:rgba(255,255,255,.14); color:var(--ink);}
.pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:12px; font-weight:700;}
.pill-hidden{background:rgba(192,57,43,.25); color:#ff9b8f;}
.pill-rep{background:rgba(255,209,102,.2); color:var(--gold);}
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 ניהול</h1>
  <p class="sub">מספר החידונים והמורים במערכת</p>

  <div id="gate" style="text-align:center; margin:30px 0;">
    <button onclick="adminSignIn()" style="background:#fff; color:#1a2342; border:none; border-radius:10px; padding:12px 22px; cursor:pointer; font-family:Heebo; font-size:16px; font-weight:700;">התחברות עם Google</button>
    <p id="gate-msg" style="color:var(--ink-dim); margin-top:14px;">העמוד הזה פתוח רק לניהול. התחברו כדי להמשיך.</p>
  </div>

  <div id="panel" style="display:none;">
    <div style="text-align:center; margin-bottom:16px; font-size:14px; color:var(--ink-dim);">
      מחובר כ־<b id="who" style="color:var(--gold);"></b> · <button onclick="firebase.auth().signOut()" style="background:none; border:none; color:var(--ink-dim); text-decoration:underline; cursor:pointer; font-family:Heebo;">התנתקות</button>
    </div>
    <div class="stat">
      <div class="box"><div class="num" id="n-teachers">–</div><div class="lbl">מורים</div></div>
      <div class="box"><div class="num" id="n-quizzes">–</div><div class="lbl">חידונים</div></div>
    </div>
    <div id="list"></div>
    <p id="msg">טוען...</p>
    <div id="moderation"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div style="position:fixed; bottom:8px; left:10px; font-size:11px; color:rgba(170,180,207,.5); z-index:50;">admin v2</div>
<!-- v1: מודאל אישור פנימי — מחליף confirm() הנייטיב (מונע "Suppress dialogs") -->
<div class="confirm-ov" id="confirm-ov" onclick="if(event.target===this) _confirmResolve(false)">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="cbtn yes" id="confirm-yes" onclick="_confirmResolve(true)">אישור</button>
      <button class="cbtn no" id="confirm-no" onclick="_confirmResolve(false)">ביטול</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCImwbGG-lLQTuij-JzNSXcrLQk-i-TQGE",
  authDomain: "teachers-6e0bb.firebaseapp.com",
  databaseURL: "https://teachers-6e0bb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "teachers-6e0bb",
  storageBucket: "teachers-6e0bb.firebasestorage.app",
  messagingSenderId: "568740581492",
  appId: "1:568740581492:web:ae703d6df4efce79ba4121"
};
firebase.initializeApp(firebaseConfig);
const fdb = firebase.database();
const fauth = firebase.auth();

const ADMIN_EMAILS = ['yanivhpro@gmail.com', 'yaniv.hakim@mail.huji.ac.il'];
let adminLoaded = false;
// v1: toast + מודאל אישור פנימי — מחליפים alert/confirm נייטיב. var (מורם) כדי שיהיו נגישים בכל קריאה ללא תלות ברצף האתחול.
function toast(t){ const el=document.getElementById('toast'); if(!el) return; el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'), 2600); }
var _confirmYes = null, _confirmNo = null;
function showConfirm(msg, onYes, onNo){
  const ov = document.getElementById('confirm-ov');
  if (!ov){ return; }
  document.getElementById('confirm-msg').textContent = msg;
  _confirmYes = (typeof onYes === 'function') ? onYes : null;
  _confirmNo  = (typeof onNo  === 'function') ? onNo  : null;
  ov.classList.add('on');
}
function _confirmResolve(yes){
  const ov = document.getElementById('confirm-ov'); if (ov) ov.classList.remove('on');
  const y = _confirmYes, n = _confirmNo;
  _confirmYes = null; _confirmNo = null;
  if (yes){ if (y) y(); } else { if (n) n(); }
}

function adminSignIn(){
  const provider = new firebase.auth.GoogleAuthProvider();
  fauth.signInWithPopup(provider).catch(err => {
    document.getElementById('gate-msg').textContent = 'ההתחברות נכשלה או בוטלה. נסו שוב.';
  });
}

fauth.onAuthStateChanged(user => {
  const email = user && user.email ? user.email.toLowerCase() : '';
  if (user && ADMIN_EMAILS.includes(email)){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    document.getElementById('who').textContent = email;
    if (!adminLoaded){ adminLoaded = true; loadAdmin(); loadModeration(); }
  } else if (user){
    // מחובר אבל לא המנהל
    document.getElementById('gate').style.display = 'block';
    document.getElementById('panel').style.display = 'none';
    document.getElementById('gate-msg').textContent = 'אין הרשאה לחשבון הזה. התחברו עם חשבון הניהול.';
  } else {
    document.getElementById('gate').style.display = 'block';
    document.getElementById('panel').style.display = 'none';
    document.getElementById('gate-msg').textContent = 'העמוד הזה פתוח רק לניהול. התחברו כדי להמשיך.';
  }
});

function loadAdmin(){
fdb.ref('teachers').once('value').then(snap => {
  const data = snap.val() || {};
  const keys = Object.keys(data);
  let totalQuizzes = 0;
  const rows = keys.map(k => {
    const quizzes = data[k] || {};
    const n = Object.keys(quizzes).length;
    totalQuizzes += n;
    // ניקח את המייל מתוך אחד החידונים (שמור כ-ownerEmail) או מהמפתח
    let email = k;
    const first = Object.values(quizzes)[0];
    if (first && first.ownerEmail) email = first.ownerEmail;
    return { email, n, key: k };
  }).sort((a,b)=>b.n-a.n);

  document.getElementById('n-teachers').textContent = keys.length;
  document.getElementById('n-quizzes').textContent = totalQuizzes;

  const list = document.getElementById('list');
  list.innerHTML = '';
  rows.forEach(r => {
    const d = document.createElement('div'); d.className='row';
    const left = document.createElement('span'); left.className='email'; left.textContent = r.email;
    const right = document.createElement('span'); right.style.cssText='display:flex; gap:10px; align-items:center; white-space:nowrap;';
    const cnt = document.createElement('span'); cnt.className='count'; cnt.textContent = r.n + ' חידונים';
    const del = document.createElement('button');
    del.textContent = '🗑 מחיקה';
    del.style.cssText = 'background:#c0392b; color:#fff; border:none; border-radius:8px; padding:6px 12px; cursor:pointer; font-family:Heebo; font-size:13px;';
    del.onclick = () => {
      showConfirm('למחוק את כל החידונים של ' + r.email + '? פעולה זו אינה הפיכה.', ()=>{
        Promise.all([
          fdb.ref('teachers/'+r.key).remove(),
          fdb.ref('teacher_emails/'+r.key).remove()
        ]).then(()=>{ d.remove(); }).catch(e=>toast('תקלה: '+e.message));
      });
    };
    right.appendChild(cnt); right.appendChild(del);
    d.appendChild(left); d.appendChild(right);
    list.appendChild(d);
  });
  document.getElementById('msg').textContent = keys.length ? '' : 'עדיין אין מורים במערכת.';
}).catch(e => {
  document.getElementById('msg').textContent = 'תקלה בטעינה: ' + e.message;
});
}

// ===== v2: מודרציה — דיווחים, הסתרה, חסימות, ערעורים =====
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const REASON_HE = { offensive:'תוכן פוגעני', wrong:'מידע שגוי', spam:'ספאם', quality:'איכות ירודה', other:'אחר' };
const SERIAL_REPORTER_THRESHOLD = 5;
const OWNER_REPORTED_THRESHOLD = 3;
function relTime(ts){
  if (!ts) return '';
  const d = Date.now() - ts, m = Math.floor(d/60000), h = Math.floor(m/60), days = Math.floor(h/24);
  if (days > 0) return 'לפני ' + days + ' ימים';
  if (h > 0) return 'לפני ' + h + ' שעות';
  if (m > 0) return 'לפני ' + m + ' דקות';
  return 'הרגע';
}
function loadModeration(){
  const box = document.getElementById('moderation');
  if (box) box.innerHTML = '<p style="color:var(--ink-dim); margin-top:20px;">טוען מודרציה…</p>';
  Promise.all([
    fdb.ref('library').once('value'),
    fdb.ref('lib_reports').once('value'),
    fdb.ref('blocked').once('value'),
    fdb.ref('appeals').once('value'),
    fdb.ref('teachers').once('value')
  ]).then(snaps => {
    const lib = snaps[0].val() || {}, reps = snaps[1].val() || {}, blocked = snaps[2].val() || {}, appeals = snaps[3].val() || {}, teachers = snaps[4].val() || {};
    const uidEmail = {};
    Object.keys(teachers).forEach(uid => { const qs = teachers[uid] || {}; const first = Object.values(qs)[0]; uidEmail[uid] = (first && first.ownerEmail) ? first.ownerEmail : uid; });
    renderModeration(lib, reps, blocked, appeals, uidEmail);
  }).catch(e => { if (box) box.innerHTML = '<p style="color:#ff6b6b;">תקלה בטעינת מודרציה: ' + esc(e.message) + '</p>'; });
}
function renderModeration(lib, reps, blocked, appeals, uidEmail){
  const box = document.getElementById('moderation'); if (!box) return;
  let html = '';
  const reportedIds = Object.keys(lib).filter(id => lib[id] && ((lib[id].reports||0) > 0 || lib[id].hidden === true));
  reportedIds.sort((a,b) => (lib[b].reports||0) - (lib[a].reports||0));
  html += '<div class="mod-h">🚩 פריטים מדווחים (' + reportedIds.length + ')</div>';
  if (!reportedIds.length) html += '<div class="mod-empty">אין דיווחים פתוחים.</div>';
  reportedIds.forEach(id => {
    const it = lib[id], n = it.reports || 0, isHidden = it.hidden === true, autoHidden = n >= 3;
    const qCount = (it.quiz && it.quiz.questions) ? it.quiz.questions.length : (it.questionCount || 0);
    const pill = isHidden ? '<span class="pill pill-hidden">מוסתר ידנית</span>' : (autoHidden ? '<span class="pill pill-hidden">מוסתר (3+ דיווחים)</span>' : '<span class="pill pill-rep">' + n + ' דיווחים</span>');
    html += '<div class="mod-card"><div class="ttl">' + esc(it.title || 'חידון') + '</div>';
    html += '<div class="st">מאת ' + esc(it.ownerName || 'מורה') + ' · ' + qCount + ' שאלות · ' + pill + '</div>';
    const ir = reps[id] || {};
    Object.keys(ir).forEach(ruid => { const r = ir[ruid] || {}; const rsn = REASON_HE[r.reason] || r.reason || '—'; const note = r.note ? ' — ' + esc(r.note) : ''; html += '<div class="mod-rep"><b>' + esc(r.email || ruid) + '</b> · ' + esc(rsn) + note + ' <span style="opacity:.55;">(' + relTime(r.ts) + ')</span></div>'; });
    html += '<div class="mod-actions"><button class="b-restore" data-act="restore" data-id="' + esc(id) + '">↩︎ השב לספרייה</button>';
    if (!isHidden) html += '<button class="b-hide" data-act="hide" data-id="' + esc(id) + '">🙈 הסתר ידנית</button>';
    if (it.ownerUid && !blocked[it.ownerUid]) html += '<button class="b-block" data-act="block" data-id="' + esc(it.ownerUid) + '" data-email="' + esc(uidEmail[it.ownerUid]||'') + '">⛔ חסום בעלים</button>';
    html += '</div></div>';
  });
  const ownerAgg = {};
  Object.keys(lib).forEach(id => { const it = lib[id]; if (!it) return; const n = it.reports||0; if (n<=0) return; const ou = it.ownerUid; if (!ou) return; if (!ownerAgg[ou]) ownerAgg[ou] = { reports:0, items:0, email: uidEmail[ou]||ou }; ownerAgg[ou].reports += n; ownerAgg[ou].items += 1; });
  const fOwners = Object.keys(ownerAgg).filter(o => ownerAgg[o].reports >= OWNER_REPORTED_THRESHOLD).sort((a,b)=>ownerAgg[b].reports-ownerAgg[a].reports);
  html += '<div class="mod-h">👤 בעלים שתוכנם דווח (' + OWNER_REPORTED_THRESHOLD + '+)</div>';
  if (!fOwners.length) html += '<div class="mod-empty">אין.</div>';
  fOwners.forEach(o => { const a = ownerAgg[o]; html += '<div class="mod-card"><div class="st"><b>' + esc(a.email) + '</b> — ' + a.reports + ' דיווחים על ' + a.items + ' מהחידונים שלו</div><div class="mod-actions">'; html += blocked[o] ? '<span style="color:var(--ink-dim); font-size:13px;">חסום ✓</span>' : '<button class="b-block" data-act="block" data-id="' + esc(o) + '" data-email="' + esc(a.email) + '">⛔ חסום</button>'; html += '</div></div>'; });
  const repAgg = {};
  Object.keys(reps).forEach(qid => { const m = reps[qid] || {}; Object.keys(m).forEach(ru => { if (!repAgg[ru]) repAgg[ru] = { count:0, email: (m[ru] && m[ru].email) || ru }; repAgg[ru].count += 1; }); });
  const serial = Object.keys(repAgg).filter(r => repAgg[r].count >= SERIAL_REPORTER_THRESHOLD).sort((a,b)=>repAgg[b].count-repAgg[a].count);
  html += '<div class="mod-h">📢 מדווחים חריגים (' + SERIAL_REPORTER_THRESHOLD + '+ פריטים)</div>';
  html += '<div class="mod-empty">התרעה בלבד — חסימה ידנית לפי שיקולך.</div>';
  if (!serial.length) html += '<div class="mod-empty">אין.</div>';
  serial.forEach(r => { const a = repAgg[r]; html += '<div class="mod-card"><div class="st"><b>' + esc(a.email) + '</b> — דיווח על ' + a.count + ' פריטים שונים</div><div class="mod-actions">'; html += blocked[r] ? '<span style="color:var(--ink-dim); font-size:13px;">חסום ✓</span>' : '<button class="b-block" data-act="block" data-id="' + esc(r) + '" data-email="' + esc(a.email) + '">⛔ חסום</button>'; html += '</div></div>'; });
  const apUids = Object.keys(appeals);
  html += '<div class="mod-h">✉️ ערעורים (' + apUids.length + ')</div>';
  if (!apUids.length) html += '<div class="mod-empty">אין ערעורים.</div>';
  apUids.forEach(uid => { const ap = appeals[uid] || {}; html += '<div class="mod-card"><div class="st"><b>' + esc(ap.email || uid) + '</b> <span style="opacity:.55;">(' + relTime(ap.ts) + ')</span></div>'; html += '<div style="font-size:14px; background:rgba(255,255,255,.05); border-radius:8px; padding:10px; margin:6px 0;">' + esc(ap.text || '') + '</div><div class="mod-actions">'; html += blocked[uid] ? '<button class="b-unblock" data-act="unblock" data-id="' + esc(uid) + '">✔︎ בטל חסימה</button>' : '<span style="color:var(--ink-dim); font-size:13px;">לא חסום כרגע</span>'; html += '<button class="b-unblock" data-act="dismiss" data-id="' + esc(uid) + '">דחה ערעור</button></div></div>'; });
  const blkUids = Object.keys(blocked);
  html += '<div class="mod-h">⛔ משתמשים חסומים (' + blkUids.length + ')</div>';
  if (!blkUids.length) html += '<div class="mod-empty">אין משתמשים חסומים.</div>';
  blkUids.forEach(uid => { const b = blocked[uid] || {}; const em = (b && b.email) ? b.email : (uidEmail[uid]||uid); html += '<div class="mod-card"><div class="st"><b>' + esc(em) + '</b> <span style="opacity:.55;">' + (b.ts ? '('+relTime(b.ts)+')' : '') + '</span></div><div class="mod-actions"><button class="b-unblock" data-act="unblock" data-id="' + esc(uid) + '">✔︎ בטל חסימה</button></div></div>'; });
  box.innerHTML = html;
  box.querySelectorAll('button[data-act]').forEach(btn => {
    btn.onclick = () => {
      const act = btn.getAttribute('data-act'), id = btn.getAttribute('data-id'), email = btn.getAttribute('data-email') || '';
      if (act === 'restore') restoreItem(id);
      else if (act === 'hide') hideItem(id);
      else if (act === 'block') blockUser(id, email);
      else if (act === 'unblock') unblockUser(id);
      else if (act === 'dismiss') dismissAppeal(id);
    };
  });
}
function restoreItem(quizId){ showConfirm('להשיב את הפריט לספרייה? הדיווחים יימחקו והוא יוצג שוב.', ()=>{ Promise.all([ fdb.ref('library/'+quizId+'/hidden').set(false), fdb.ref('library/'+quizId+'/reports').set(0), fdb.ref('lib_reports/'+quizId).remove() ]).then(()=>{ toast('הפריט הושב לספרייה.'); loadModeration(); }).catch(e=>toast('תקלה: '+e.message)); }); }
function hideItem(quizId){ showConfirm('להסתיר את הפריט מהספרייה? (הפיך)', ()=>{ fdb.ref('library/'+quizId+'/hidden').set(true).then(()=>{ toast('הפריט הוסתר.'); loadModeration(); }).catch(e=>toast('תקלה: '+e.message)); }); }
function blockUser(uid, email){ showConfirm('לחסום את ' + (email||uid) + '?\nלא יוכל לפרסם, לדווח או להצביע בספרייה. תוכן פרטי לא נחסם.', ()=>{ fdb.ref('blocked/'+uid).set({ email: email||'', ts: Date.now(), by: (fauth.currentUser && fauth.currentUser.email) || '' }).then(()=>{ toast('המשתמש נחסם.'); loadModeration(); }).catch(e=>toast('תקלה: '+e.message)); }); }
function unblockUser(uid){ showConfirm('לבטל את החסימה?', ()=>{ fdb.ref('blocked/'+uid).remove().then(()=>{ toast('החסימה בוטלה.'); loadModeration(); }).catch(e=>toast('תקלה: '+e.message)); }); }
function dismissAppeal(uid){ showConfirm('למחוק את הערעור?', ()=>{ fdb.ref('appeals/'+uid).remove().then(()=>{ toast('הערעור נמחק.'); loadModeration(); }).catch(e=>toast('תקלה: '+e.message)); }); }
</script>
</body>
</html>
