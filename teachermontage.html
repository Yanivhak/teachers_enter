<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>מצגת תמונות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#05080f; --bg2:#0a1020;
  --ink:#f7f4ec; --ink-dim:#aab4cf;
  --gold:#ffd166; --teal:#2ec4b6; --coral:#ff6b6b; --violet:#8d8df2;
  --card:#22325c;
}
*{box-sizing:border-box;}
html,body{margin:0; padding:0; min-height:100%;}
body{
  font-family:'Heebo', sans-serif;
  background:radial-gradient(1200px 700px at 75% -10%, #16223f 0%, var(--bg2) 45%, var(--bg1) 100%);
  color:var(--ink); min-height:100vh;
}
.screen{display:none; min-height:100vh; padding:24px; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative;}
.screen.on{display:flex;}
h1{font-family:'Secular One'; font-size:clamp(32px,5vw,52px); margin:0 0 6px; color:var(--gold);}
.sub{font-size:18px; color:var(--ink-dim); max-width:440px; margin:0 0 28px; line-height:1.5;}
.btn{font-family:'Heebo'; font-weight:700; font-size:19px; border:none; border-radius:14px; padding:15px 30px; cursor:pointer;
  background:var(--gold); color:#1a2342; transition:transform .12s ease;}
.btn:active{transform:translateY(1px);}
.btn.ghost{background:transparent; color:var(--ink); box-shadow:inset 0 0 0 2px var(--ink-dim);}
.btn:disabled{opacity:.5; cursor:default;}
.row{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:10px;}
.list{display:flex; flex-direction:column; gap:6px; margin:8px 0; font-size:14px;}
.list .item{display:flex; align-items:center; gap:10px; justify-content:center;}
.list .x{background:none; border:1px solid rgba(255,255,255,.3); color:var(--coral); border-radius:50%; width:24px; height:24px; cursor:pointer; font-size:13px; line-height:1;}
.note{font-size:13px; color:var(--ink-dim); margin-top:14px; max-width:420px;}
.capbox{margin:14px 0; display:none;}
.capbox.on{display:block;}
.capbox input{font-family:'Heebo'; font-size:17px; padding:12px 16px; border-radius:12px; border:2px solid rgba(255,255,255,.18); background:rgba(255,255,255,.08); color:var(--ink); width:min(420px,86vw); text-align:center;}
.capbox input:focus{border-color:var(--gold); outline:none;}

/* מסך המצגת */
#show{padding:0;}
.monwrap{position:fixed; inset:0; background:#000; z-index:3;}
.monwrap img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity 1.8s ease;}
.monwrap img.vis{opacity:1;}
.moncap{position:fixed; bottom:42px; left:0; right:0; text-align:center; z-index:4; font-family:'Secular One'; font-size:clamp(28px,4vw,52px); color:var(--gold); text-shadow:0 2px 14px rgba(0,0,0,.9);}
#mon-progress{position:fixed; bottom:0; left:0; right:0; height:14px; background:rgba(0,0,0,.55); z-index:5;}
#mon-progress i{display:block; height:100%; width:0; background:linear-gradient(90deg, var(--gold), #ffe9a8); transition:width .5s linear; box-shadow:0 0 12px var(--gold);}
#mon-controls{position:fixed; top:16px; right:16px; z-index:6; display:flex; gap:8px;}
#mon-controls button{font-family:'Heebo'; font-size:15px; font-weight:700; color:var(--ink); background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.3); border-radius:10px; padding:9px 16px; cursor:pointer;}
#mon-controls button:active{transform:translateY(1px);}
</style>
</head>
<body>

<!-- מסך הגדרה -->
<div class="screen on" id="setup">
  <h1>🎬 מצגת תמונות</h1>
  <p class="sub">בחרו תמונות ומוזיקה מהמחשב, ולחצו להתחיל. הכול נשאר על המחשב הזה ולא עולה לאינטרנט.</p>

  <div class="row">
    <button class="btn ghost" id="pics-btn" onclick="$('pics-input').click()">📷 בחירת תמונות</button>
    <button class="btn ghost" id="music-btn" onclick="$('music-input').click()">🎵 בחירת מוזיקה</button>
    <button class="btn ghost" id="cap-btn" onclick="toggleCap()">✏️ הוספת כיתוב</button>
  </div>

  <input type="file" id="pics-input" accept="image/*" multiple style="display:none" onchange="picsChosen(this.files)">
  <input type="file" id="music-input" accept="audio/*" multiple style="display:none" onchange="musicChosen(this.files)">

  <div class="capbox" id="capbox">
    <input type="text" id="cap-text" maxlength="60" placeholder="כיתוב שיופיע על המצגת (לא חובה)">
  </div>

  <div class="list" id="music-list"></div>

  <div class="row" style="margin-top:18px;">
    <button class="btn" id="start-btn" onclick="startShow()" disabled>▶️ התחלת המצגת</button>
  </div>

  <p class="note">📷 התמונות והשירים נטענים מהמחשב הזה בלבד ואינם עולים לרשת.</p>
  <p class="note">טיפ: שיר אחד באורך 3-4 דקות מספיק — הוא יתנגן בלולאה. אפשר להוסיף עוד שירים.</p>
</div>

<!-- מסך המצגת -->
<div class="screen" id="show">
  <div class="monwrap" id="monwrap"></div>
  <div class="moncap" id="moncap"></div>
  <div id="mon-progress"><i id="mon-progress-fill"></i></div>
  <div id="mon-controls">
    <button onclick="togglePause()" id="mon-pause">⏸️ עצור</button>
    <button onclick="finishShow()">✖️ סיום</button>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function show(id){ document.querySelectorAll('.screen').forEach(s => s.classList.remove('on')); $(id).classList.add('on'); }

/* ---------- בחירת תמונות ---------- */
let pics = [];
function picsChosen(files){
  if (!files || !files.length) return;
  pics.forEach(u => URL.revokeObjectURL(u));
  pics = [...files].map(f => URL.createObjectURL(f));
  $('pics-btn').textContent = '📷 ' + pics.length + ' תמונות ✓ (לחיצה מחליפה)';
  $('pics-input').value = '';
  refreshStart();
}

/* ---------- בחירת מוזיקה ---------- */
let playlist = [], playIdx = 0, audio = null;
function musicChosen(files){
  if (!files || !files.length) return;
  [...files].forEach(f => playlist.push({ name: f.name, url: URL.createObjectURL(f) }));
  $('music-input').value = '';
  renderMusicList();
}
function removeSong(i){
  URL.revokeObjectURL(playlist[i].url);
  playlist.splice(i, 1);
  renderMusicList();
}
function renderMusicList(){
  const box = $('music-list');
  box.innerHTML = '';
  playlist.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'item';
    const txt = document.createElement('span');
    txt.textContent = '🎵 ' + (i+1) + '. ' + s.name;
    const x = document.createElement('button');
    x.className = 'x'; x.textContent = '✕'; x.title = 'הסרת השיר';
    x.onclick = () => removeSong(i);
    row.appendChild(txt); row.appendChild(x);
    box.appendChild(row);
  });
  $('music-btn').textContent = playlist.length ? '🎵 הוספת שיר נוסף' : '🎵 בחירת מוזיקה';
}

/* ---------- כיתוב ---------- */
function toggleCap(){
  $('capbox').classList.toggle('on');
  if ($('capbox').classList.contains('on')) $('cap-text').focus();
}

function refreshStart(){
  $('start-btn').disabled = pics.length === 0;
}

/* ---------- ניגון מוזיקה ---------- */
function playMusic(){
  if (!playlist.length) return;
  if (audio){ audio.pause(); }
  audio = new Audio(playlist[playIdx % playlist.length].url);
  audio.onended = () => { playIdx++; playMusic(); };
  audio.play().catch(()=>{});
}

/* ---------- המצגת ---------- */
let monIv = null, paused = false, stepFn = null, intervalMs = 4500;
function startShow(){
  if (!pics.length) return;
  const cap = $('cap-text').value.trim();
  $('moncap').textContent = cap;
  show('show');
  playIdx = 0;
  playMusic();

  const wrap = $('monwrap');
  wrap.innerHTML = '';
  const a = document.createElement('img'), b = document.createElement('img');
  wrap.appendChild(a); wrap.appendChild(b);

  // ערבוב חד-פעמי: עוברים על כל התמונות פעם אחת בלי כפילויות
  const order = pics.slice();
  shuffle(order);

  const SLIDE_MS = 4500;
  let idx = 0, flip = false;
  const fill = $('mon-progress-fill');

  function step(){
    if (idx >= order.length){ idx = 0; shuffle(order); }
    const cur = flip ? b : a, prev = flip ? a : b;
    cur.src = order[idx];
    cur.classList.add('vis'); prev.classList.remove('vis');
    flip = !flip;
    idx++;
    fill.style.width = Math.round((idx / order.length) * 100) + '%';
  }
  step();
  clearInterval(monIv);
  monIv = setInterval(step, SLIDE_MS);
  paused = false;
  stepFn = step;
  intervalMs = SLIDE_MS;
  $('mon-pause').textContent = '⏸️ עצור';
}

function shuffle(arr){
  for (let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function togglePause(){
  paused = !paused;
  if (paused){
    clearInterval(monIv);
    if (audio){ try{ audio.pause(); }catch(e){} }
    $('mon-pause').textContent = '▶️ המשך';
  } else {
    if (stepFn) monIv = setInterval(stepFn, intervalMs);
    if (audio){ audio.play().catch(()=>{}); }
    $('mon-pause').textContent = '⏸️ עצור';
  }
}

function finishShow(){
  clearInterval(monIv);
  if (audio){ try{ audio.pause(); }catch(e){} }
  show('setup');
}
</script>
</body>
</html>
